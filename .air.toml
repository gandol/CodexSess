root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
entrypoint = "./cmd/main.go"
cmd = "go build -o ./tmp/codexsess ./cmd"
full_bin = "PORT=3052 CODEXSESS_NO_OPEN_BROWSER=1 ./tmp/codexsess"
include_ext = ["go"]
exclude_dir = ["tmp", "web", "node_modules"]
delay = 500
stop_on_error = true
send_interrupt = true
kill_delay = "500ms"

[log]
time = true
